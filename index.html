<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المدة منذ إغلاق متطلبات الترقية للمعلمين تاريخ 16-11-1447هـ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#0f0c29;
    --bg2:#302b63;
    --bg3:#24243e;
    --gold:#f7c948;
    --glass-bg: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.18);
    --text-light:#f5f5fa;
    --text-dim: rgba(245,245,250,0.65);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:'Tajawal','Cairo',sans-serif;
    min-height:100vh;
    background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
    background-size: 300% 300%;
    animation: gradientShift 18s ease infinite;
    color: var(--text-light);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px;
    overflow-x:hidden;
    position:relative;
  }

  @keyframes gradientShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  /* شعار الخلفية أعلى الصفحة - شفافية 80% (تظهر بنسبة 20% فقط) */
  .logo-bg{
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    z-index: 0;
    pointer-events: none;
    opacity: 0.2;
  }
  .logo-bg img{
    width: 100%;
    height: auto;
    object-fit: contain;
  }

  /* توهج خلفي ناعم */
  body::before, body::after{
    content:"";
    position:fixed;
    border-radius:50%;
    filter: blur(120px);
    opacity:0.35;
    z-index:0;
    pointer-events:none;
  }
  body::before{
    width:420px;height:420px;
    background: var(--gold);
    top:-100px; right:-100px;
  }
  body::after{
    width:380px;height:380px;
    background:#5b8cff;
    bottom:-120px; left:-100px;
  }

  .container{
    position:relative;
    z-index:1;
    width:100%;
    max-width:1000px;
    text-align:center;
  }

  .icon-wrap{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:76px;height:76px;
    border-radius:50%;
    background: var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    margin-bottom:18px;
    box-shadow: 0 0 30px rgba(247,201,72,0.25);
    animation: pulseGlow 3s ease-in-out infinite;
  }

  @keyframes pulseGlow{
    0%,100%{box-shadow: 0 0 20px rgba(247,201,72,0.2);}
    50%{box-shadow: 0 0 40px rgba(247,201,72,0.45);}
  }

  .icon-wrap svg{
    width:36px;height:36px;
    stroke: var(--gold);
  }

  h1{
    font-family:'Cairo', sans-serif;
    font-weight:900;
    font-size: clamp(24px, 4vw, 42px);
    background: linear-gradient(90deg, #fff, var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .subtitle{
    color: var(--text-dim);
    font-size: clamp(13px, 2vw, 17px);
    font-weight: 400;
    margin-bottom: 42px;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
    margin-bottom: 30px;
  }

  @media (max-width: 900px){
    .grid{ grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 480px){
    .grid{ grid-template-columns: repeat(2, 1fr); gap: 12px; }
  }

  .card{
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 20px;
    padding: 22px 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
    overflow:hidden;
  }

  .card:hover{
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(247,201,72,0.15);
  }

  .card .value{
    font-family:'Cairo', sans-serif;
    font-weight:900;
    font-size: clamp(28px, 5vw, 48px);
    color: var(--text-light);
    line-height: 1.1;
    display:inline-block;
  }

  .card .value.animate{
    animation: popIn 0.4s ease;
  }

  @keyframes popIn{
    0%{ transform: scale(0.7); opacity:0.4; }
    60%{ transform: scale(1.12); }
    100%{ transform: scale(1); opacity:1; }
  }

  .card .label{
    margin-top:8px;
    font-size: clamp(11px, 1.6vw, 14px);
    color: var(--text-dim);
    font-weight: 500;
  }

  .card .glow-line{
    position:absolute;
    bottom:0; right:0; left:0;
    height:3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:0.7;
  }

  .footer-note{
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 10px;
    opacity:0.8;
  }

  .not-started{
    font-family:'Cairo', sans-serif;
    font-size: clamp(20px, 3vw, 30px);
    font-weight:700;
    color: var(--gold);
    background: var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(14px);
    padding: 30px;
    border-radius: 20px;
  }
</style>
</head>

  <h1>المدة منذ إغلاق متطلبات الترقية للمعلمين تاريخ 16-11-1447هـ</h1>
  <p class="subtitle">يتم احتساب الوقت تلقائيًا حتى لحظة دخولك للصفحة</p>

  <div id="counterArea"></div>

  <p class="footer-note">التاريخ الميلادي المقابل وفق تقويم أم القرى: 3 مايو 2026م</p>

</div>

<script>
  /* ============================================================
     نقطة بداية العدّاد
     ------------------------------------------------------------
     تاريخ 16-11-1447هـ يوافق 3 مايو 2026م ميلاديًا وفق تقويم أم القرى.
     لتغيير تاريخ البداية لاحقًا، عدّل القيم أدناه فقط
     (السنة، الشهر [0=يناير]، اليوم، الساعة، الدقيقة، الثانية).
  ============================================================ */
  const startDate = new Date(2026, 4, 3, 0, 0, 0); // 3 مايو 2026 = 16-11-1447هـ

  const counterArea = document.getElementById('counterArea');

  const units = [
    { key: 'years',   label: 'سنة'   },
    { key: 'months',  label: 'شهر'   },
    { key: 'days',    label: 'يوم'   },
    { key: 'hours',   label: 'ساعة'  },
    { key: 'minutes', label: 'دقيقة' },
    { key: 'seconds', label: 'ثانية' }
  ];

  function buildGrid(){
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.id = 'grid';
    units.forEach(u => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <span class="value" id="val-${u.key}">0</span>
        <div class="label">${u.label}</div>
        <div class="glow-line"></div>
      `;
      grid.appendChild(card);
    });
    counterArea.innerHTML = '';
    counterArea.appendChild(grid);
  }

  function showNotStarted(){
    counterArea.innerHTML = `<div class="not-started">لم يبدأ العدّاد بعد</div>`;
  }

  // حساب الفرق الزمني بدقة (سنوات / أشهر / أيام / ساعات / دقائق / ثواني)
  function calculateDiff(from, to){
    let years = to.getFullYear() - from.getFullYear();
    let months = to.getMonth() - from.getMonth();
    let days = to.getDate() - from.getDate();
    let hours = to.getHours() - from.getHours();
    let minutes = to.getMinutes() - from.getMinutes();
    let seconds = to.getSeconds() - from.getSeconds();

    if (seconds < 0){ seconds += 60; minutes--; }
    if (minutes < 0){ minutes += 60; hours--; }
    if (hours < 0){ hours += 24; days--; }
    if (days < 0){
      const prevMonth = new Date(to.getFullYear(), to.getMonth(), 0);
      days += prevMonth.getDate();
      months--;
    }
    if (months < 0){ months += 12; years--; }

    return { years, months, days, hours, minutes, seconds };
  }

  let lastValues = {};

  function updateCounter(){
    const now = new Date();

    if (now < startDate){
      showNotStarted();
      return;
    }

    // إعادة بناء الشبكة إذا لم تكن موجودة (مثلاً بعد حالة "لم يبدأ بعد")
    if (!document.getElementById('grid')){
      buildGrid();
    }

    const diff = calculateDiff(startDate, now);

    units.forEach(u => {
      const el = document.getElementById(`val-${u.key}`);
      const newVal = diff[u.key];
      if (lastValues[u.key] !== newVal){
        el.textContent = newVal;
        el.classList.remove('animate');
        void el.offsetWidth; // إعادة تشغيل الأنيميشن
        el.classList.add('animate');
        lastValues[u.key] = newVal;
      }
    });
  }

  buildGrid();
  updateCounter();
  setInterval(updateCounter, 1000);
</script>
